[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "24"
  # The site build needs only `dependencies`. Skipping devDependencies keeps
  # Playwright (a dev-only ops tool for scripts/watch-registrations.mjs) and its
  # browser binary off Netlify entirely.
  NPM_FLAGS = "--omit=dev"
  # Belt-and-suspenders: even if Playwright ever installed, never fetch a browser.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sponsors/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
